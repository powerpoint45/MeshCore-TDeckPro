[LilyGo_TDeck]
extends = esp32_base
board = t-deck

upload_flags =
    --before=default_reset
    --after=hard_reset
    --no-stub


board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
upload_speed = 115200       ; Lower speed is much more reliable for S3 internal USB
monitor_speed = 115200
upload_protocol = esptool
board_build.f_cpu = 240000000L



build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/lilygo_tdeck

  ; CRITICAL: Set debug level to 3 to see why it hangs
  -D CORE_DEBUG_LEVEL=3
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D CONFIG_SPIRAM_MODE_OPI=1
  -D CONFIG_SPIRAM_SPEED_40M=1
  -D BOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  

  -D PIN_USER_BTN=0




  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper

  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=false
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8f

  ; LoRa
  -D PIN_LORA_EN=46
  -D P_LORA_DIO_1=5
  -D P_LORA_NSS=3
  -D P_LORA_RESET=4
  -D P_LORA_BUSY=6
  -D P_LORA_SCLK=36
  -D P_LORA_MISO=47
  -D P_LORA_MOSI=33

  -D HAS_BQ27220_BATTERY=1

  ; Display
  -D DISPLAY_CLASS=GxEPDDisplay
  -D EINK_DISPLAY_MODEL=GxEPD2_310_GDEQ031T10
  -D EINK_SCALE_X=1.0f
  -D EINK_SCALE_Y=1.0f
  -D EINK_X_OFFSET=0
  -D EINK_Y_OFFSET=15
  -D PIN_DISPLAY_CS=34
  -D DISP_CS=34
  -D PIN_DISPLAY_DC=35
  -D PIN_DISPLAY_RST=16
  -D PIN_DISPLAY_BUSY=37
  -D PIN_DISPLAY_SCLK=36
  -D PIN_DISPLAY_MOSI=33
  -D PIN_DISPLAY_MISO=47
  -D DISPLAY_ROTATION=0

  

  ; GPS
  ; GPS Pins for T-Deck Pro (S3)
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_RX=44
  -D PIN_GPS_TX=43
  -D PIN_GPS_EN=39    ; Correct EN for Pro (GPIO 39 is often used for other t
  -D GPS_EN=12
  -D GPS_RX=44
  -D GPS_TX=43
  -D GPS_PPS=1
  ;-D GPS_NMEA_DEBUG=0

  ; ... other flags ...
  -D PIN_PERF_POWERON=10  ; Global power enable for Pro
  
  ; GPS Pins for T-Deck Pro
  ; -D ENV_INCLUDE_GPS=1
  ; -D PIN_GPS_RX=9         ; Pro uses 9
  ; -D PIN_GPS_TX=8         ; Pro uses 8
  ; -D PIN_GPS_EN=12        ; Pro uses 12 (formerly 39)
  -D GPS_BAUD_RATE=38400


  ; T-Deck Pro I2C / keyboard bus
  -D PIN_I2C_SDA=13
  -D PIN_I2C_SCL=14
  -D PIN_KB_INT=15
  -D PIN_KB_LED=42
  -D PIN_SD_CS=48
  -D BOARD_SD_CS=48

  ; Fixes for the S3-Pro PSRAM timing
  ;-D CONFIG_SPIRAM_MODE_OPI=1
  ;-D CONFIG_SPIRAM_SPEED_80M=1

  -D PIN_TOUCH_INT=12
  -D PIN_TOUCH_RST=45
  -D TOUCH_ADDR=0x1A


build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/lilygo_tdeck>
  +<helpers/sensors/*.cpp>
  +<helpers/ui/GxEPDDisplay.cpp>

lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}
  zinggjm/GxEPD2 @ 1.6.2
  bakercp/CRC32 @ ^2.0.0
  adafruit/Adafruit TCA8418 @ ^1.0.2  ; Fixed name
  lewisxhe/SensorLib


[env:LilyGo_TDeck_companion_radio_usb]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  densaugeo/base64 @ ~1.4.0


[env:LilyGo_TDeck_companion_radio_ble]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  densaugeo/base64 @ ~1.4.0


[env:LilyGo_TDeck_repeater]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -D ADVERT_NAME='"TDeck Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  ${esp32_ota.lib_deps}